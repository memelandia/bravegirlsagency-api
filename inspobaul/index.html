<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspo Vault — BraveGirls Agency</title>
  <link rel="stylesheet" href="inspo-vault.css">
  <link rel="icon" type="image/png" href="/assets/img/logo-bg.png">
</head>
<body>

  <!-- Loading overlay with skeleton -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-logo">Brave<span>Girls</span></div>
      <p id="loading-status" class="loading-text">Conectando...</p>
      <div class="skeleton-grid">
        <div class="skeleton-card"><div class="sk-avatar"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w40"></div><div class="sk-chips"><span class="sk-chip"></span><span class="sk-chip"></span></div></div></div>
        <div class="skeleton-card"><div class="sk-avatar"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w40"></div><div class="sk-chips"><span class="sk-chip"></span><span class="sk-chip"></span></div></div></div>
        <div class="skeleton-card"><div class="sk-avatar"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w40"></div><div class="sk-chips"><span class="sk-chip"></span><span class="sk-chip"></span></div></div></div>
        <div class="skeleton-card"><div class="sk-avatar"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w40"></div><div class="sk-chips"><span class="sk-chip"></span><span class="sk-chip"></span></div></div></div>
        <div class="skeleton-card"><div class="sk-avatar"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w40"></div><div class="sk-chips"><span class="sk-chip"></span><span class="sk-chip"></span></div></div></div>
        <div class="skeleton-card"><div class="sk-avatar"></div><div class="sk-lines"><div class="sk-line w70"></div><div class="sk-line w40"></div><div class="sk-chips"><span class="sk-chip"></span><span class="sk-chip"></span></div></div></div>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <span class="header-logo">💡 Inspo <span>Vault</span></span>
          <div id="header-stats" class="header-stats"></div>
        </div>
        <div class="header-right">
          <button id="btn-review" class="btn btn-review hidden">
            <span class="review-pulse"></span>
            ⚡ Etiquetar <span id="review-count" class="review-badge">0</span>
          </button>
          <button id="btn-verify" class="btn btn-verify">🔍 Verificar</button>
          <button id="btn-duplicates" class="btn btn-verify">🔀 Duplicados</button>
          <button id="btn-add" class="btn btn-primary">+ Añadir</button>
        </div>
      </div>
    </header>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-row-top">
        <div class="filter-search-wrap">
          <span class="filter-search-icon">🔍</span>
          <input type="text" id="filter-search" class="filter-search" placeholder="Buscar perfil o username...">
        </div>
        <div class="mercado-pills">
          <button class="mercado-pill active" data-mercado="">Todos</button>
          <button class="mercado-pill" data-mercado="🇪🇸">🇪🇸</button>
          <button class="mercado-pill" data-mercado="🇺🇸">🇺🇸</button>
          <button class="mercado-pill" data-mercado="🇧🇷">🇧🇷</button>
        </div>
        <div class="filter-dropdowns">
          <div class="filter-multiselect" id="filter-vertical"></div>
          <div class="filter-multiselect" id="filter-modelo"></div>
          <div class="filter-multiselect" id="filter-branding"></div>
          <div class="filter-multiselect" id="filter-viral"></div>
        </div>
        <button id="filter-clear" class="filter-clear-btn hidden">✕ Limpiar</button>
      </div>
      <div id="active-filters-row" class="active-filters-row hidden"></div>
      <div class="filter-results-row"><span id="gallery-count"></span></div>
    </div>

    <!-- Gallery -->
    <div class="gallery-wrap">
      <div id="gallery-grid" class="gallery-grid"></div>
    </div>
  </div>

  <!-- Modal (Add / Edit) -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-header-left">
          <div id="modal-avatar" class="modal-avatar"></div>
          <h2 id="modal-title" class="modal-title">Añadir Perfil</h2>
        </div>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn btn-secondary">Cancelar</button>
        <button id="modal-save" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Verify Modal -->
  <div id="verify-overlay" class="modal-overlay">
    <div class="modal-container verify-modal">
      <div class="modal-header">
        <h2 id="verify-title" class="modal-title">🔍 Verificar Perfiles</h2>
        <button id="verify-close" class="modal-close">✕</button>
      </div>
      <div id="verify-body" class="verify-modal-body"></div>
    </div>
  </div>

  <!-- Review Overlay -->
  <div id="review-overlay" class="review-overlay">
    <div class="review-header">
      <button id="review-exit" class="btn btn-ghost">✕ Salir</button>
      <div class="review-progress-wrap">
        <div class="review-progress-bar-wrap">
          <div id="review-progress-bar" class="review-progress-bar"></div>
        </div>
        <span class="review-progress-text"><strong><span id="review-current">0</span></strong> / <span id="review-total">0</span></span>
      </div>
      <div></div>
    </div>
    <div class="review-body">
      <div class="review-split">
        <div id="review-preview" class="review-preview"></div>
        <div class="review-right">
          <div id="review-form" class="review-form"></div>
        </div>
      </div>
    </div>
    <div class="review-footer">
      <button id="review-prev" class="btn btn-secondary">← Anterior</button>
      <button id="review-skip" class="btn btn-ghost">Omitir →</button>
      <button id="review-save" class="btn btn-primary">Guardar y Siguiente →</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <script src="inspo-vault.js"></script>
</body>
</html>
